<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#4a7c3f"/>
  <!-- Butterfly / thyroid shape -->
  <!-- Left lobe -->
  <ellipse cx="10" cy="16" rx="7" ry="5" fill="#6a9e5a" transform="rotate(-15 10 16)"/>
  <!-- Right lobe -->
  <ellipse cx="22" cy="16" rx="7" ry="5" fill="#6a9e5a" transform="rotate(15 22 16)"/>
  <!-- Isthmus (center bridge) -->
  <rect x="13.5" y="14.5" width="5" height="3" rx="1.5" fill="#6a9e5a"/>
  <!-- Highlight on left lobe -->
  <ellipse cx="9" cy="14.5" rx="3" ry="2" fill="#8ab87a" opacity="0.5" transform="rotate(-15 9 14.5)"/>
  <!-- Highlight on right lobe -->
  <ellipse cx="23" cy="14.5" rx="3" ry="2" fill="#8ab87a" opacity="0.5" transform="rotate(15 23 14.5)"/>
</svg>
